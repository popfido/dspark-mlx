name: Publish to PyPI

# Publishes dspark-mlx to PyPI via Trusted Publishing (OIDC — no API token stored).
# Configure the trusted publisher once at https://pypi.org/manage/account/publishing/:
#   PyPI project name : dspark-mlx
#   Owner             : popfido
#   Repository name   : dspark-mlx
#   Workflow filename : publish.yml
#   Environment name  : pypi
# Then publishing a GitHub Release (or running this workflow manually) ships the build.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
